name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic sqlalchemy python-dotenv pytest httpx python-jose[cryptography] passlib
        pip install langchain langchain-openai --no-deps
        pip install openai
        pip list
    
    - name: Create data directory
      run: |
        mkdir -p data
        
    - name: Run pytest
      run: |
        python -c "from main import app; print('App imported successfully')"
        pytest tests/test_basic.py -v --tb=long